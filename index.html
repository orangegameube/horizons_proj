<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Jersey+15&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    
             <audio controls>
                <source src="music/Bach_ BWV 639 I call to you, Lord Jesus Christ - ULTRAKILL Soundtrack.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

    <div>

        <div class="window" id="aboutwindow">
            <!-- Include a header DIV with the same name as the draggable DIV, followed by "header" -->
             <div class="windowedge" id="aboutwindowedge">
                <div id="aboutwindowheader">Click here to move</div>
                <div class="min" id="minimize" onclick="resizeTab('aboutwindow')"><img class="tabbutton" src="images/minimize_button.jpeg"></div>
                <div class="exp" id="expand" onclick="resizeTab('aboutwindow')"><img class="tabbutton" src="images/expand_button.jpeg"></div>
                <div class="ex" id="exit" onclick="exitTab('aboutwindow')"><img class="tabbutton" src="images/exit_button.jpeg"></div>
             </div>
             <div id="window1">This is a window!</div>
        </div>

        <div class="appgroup">
            <div class="app" id="about">
                <img class="icon" src="images/placeholder.jpg" onclick="openTab('aboutwindow')">
                <h4 class="apptext">About</h4>
            </div>
            <div class="app" id="gallery">
                <img class="icon" src="images/placeholder.jpg">
                <h4 class="apptext">Gallery</h4>
            </div>
            <div class="app" id="projects">
                <img class="icon" src="images/placeholder.jpg">
                <h4 class="apptext">Projects</h4>
            </div>
            <div class="app" id="music">
                <img class="icon" src="images/placeholder.jpg">
                <h4 class="apptext">Music</h4>
            </div>
            <div class="app" id="thoughts">
                <img class="icon" src="images/placeholder.jpg">
                <h4 class="apptext">Thoughts</h4>
            </div>
            <div class="app" id="blog">
                <img class="icon" src="images/placeholder.jpg">
                <h4 class="apptext">Blog</h4>
            </div>
        </div>

    </div>


    <script src="script.js"></script>
    
</body>
</html>
